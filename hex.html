<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex → Decimal</title>
  <link rel="stylesheet" href="hex.css" />
</head>
<body>

  <!-- Tela Menu -->
  <div id="tela-menu" class="tela">
    <h1>Hex → Decimal</h1>
    <p>Converta números hexadecimais para decimal decompondo cada dígito pelo seu peso.</p>

    <div class="grupo-radio">
      <label class="radio-opcao">
        <input type="radio" name="dificuldade" value="1" checked />
        <strong>Nível 1</strong>
        <span>1 dígito</span>
      </label>
      <label class="radio-opcao">
        <input type="radio" name="dificuldade" value="2" />
        <strong>Nível 2</strong>
        <span>2 dígitos</span>
      </label>
      <label class="radio-opcao">
        <input type="radio" name="dificuldade" value="3" />
        <strong>Nível 3</strong>
        <span>3-4 dígitos</span>
      </label>
    </div>

    <div class="grupo-radio">
      <label class="radio-opcao">
        <input type="radio" name="suporte-hex" value="sem" />
        <strong>Sem suporte</strong>
        <span>você digita tudo</span>
      </label>
      <label class="radio-opcao">
        <input type="radio" name="suporte-hex" value="com" checked />
        <strong>Com suporte</strong>
        <span>dígitos já preenchidos</span>
      </label>
    </div>

    <button class="btn-destaque" onclick="iniciarJogo()">Começar</button>
    <button onclick="window.location.href='index.html'" style="opacity:0.5;font-size:0.9rem;">← Jogar Binário</button>
  </div>

  <!-- Tela Jogo -->
  <div id="tela-jogo" class="tela escondido">

    <div id="cabecalho-jogo">
      <button class="btn-sm" onclick="voltarMenu()">Menu</button>
      <button class="btn-sm" onclick="abrirModoGuiado()">Tutorial</button>
    </div>

    <div id="numero-hex">
      <div id="hex-numero"><span id="hex-valor"></span><sub>16</sub></div>
      <div id="seta-direcao">⟵</div>
    </div>

    <div id="grade-container"></div>

    <div id="secao-total" class="escondido">
      <hr />
      <div id="total"></div>
      <button class="btn-destaque" onclick="proximaRodada()">Próximo</button>
    </div>

  </div>

  <!-- Drawer A–F -->
  <div id="drawer-af" class="escondido">
    <div id="painel-af"></div>
    <button id="btn-drawer-af" onclick="toggleDrawerAF()">▶</button>
  </div>

<!-- Tela Tutorial (Modo Guiado) -->
<div id="tela-tutorial" class="tela escondido">
  <div id="tutorial-progresso"></div>
  <div id="tutorial-numero">
    <span id="tutorial-dig-esq">1</span><span id="tutorial-dig-dir">A</span><sub>16</sub>
  </div>
  <div id="tutorial-subtexto" class="escondido"></div>
  <div id="tutorial-pergunta"></div>
  <div id="tutorial-tabela-af" class="escondido">
    <div class="celula-af"><div class="af-hex">A</div><div class="af-dec">10</div></div>
    <div class="celula-af"><div class="af-hex">B</div><div class="af-dec">11</div></div>
    <div class="celula-af"><div class="af-hex">C</div><div class="af-dec">12</div></div>
    <div class="celula-af"><div class="af-hex">D</div><div class="af-dec">13</div></div>
    <div class="celula-af"><div class="af-hex">E</div><div class="af-dec">14</div></div>
    <div class="celula-af"><div class="af-hex">F</div><div class="af-dec">15</div></div>
  </div>
  <div id="tutorial-input-area">
    <input
      id="tutorial-input"
      type="text"
      autocomplete="off"
      maxlength="4"
    />
    <div id="tutorial-feedback"></div>
  </div>
  <button class="btn-destaque" id="tutorial-btn-confirmar" onclick="confirmarStep()">
    Confirmar
  </button>
</div>

  <script src="hex.js"></script>
</body>
</html>
