<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Binário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-menu" class="tela">
        <h1>Treino Binário</h1>

        <div class="grupo-toggle">
            <label>Modo de jogo</label>
            <button id="toggle-modo" onclick="alternarModo()">Binário → Decimal</button>
        </div>

        <div class="grupo-toggle">
            <label>Suporte</label>
            <div class="grupo-radio">
                <label class="radio-opcao">
                    <input type="radio" name="suporte" value="sem" checked> Sem suporte
                </label>
                <label class="radio-opcao">
                    <input type="radio" name="suporte" value="com"> Com suporte
                </label>
            </div>
        </div>

        <button onclick="iniciarJogo()">Jogar</button>
    </div>

    <div id="tela-jogo" class="tela escondido">
        <p id="pergunta-label"></p>
        <div id="numero-display"></div>
        <div id="tabela-suporte"></div>
        <div id="inputs-bits"></div>
        <input type="text" id="resposta" inputmode="numeric" placeholder="Digite o decimal">
        <button onclick="verificarResposta()">Confirmar</button>
        <div id="feedback"></div>
        <button id="btn-proximo" class="escondido" onclick="proximoNumero()">Próximo</button>
        <button onclick="voltarMenu()">Menu</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
